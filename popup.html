<!--
  popup.html

  Extension popup for ImageConvert. Lets the user select the output format,
  upscale method, and upscale scale factor.
  Requires: popup.js

  @author Ville Laaksoaho
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: ui-monospace, monospace;
        background: #6767a0;
        color: #f0f0ee;
        padding: 12px;
        width: 200px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    /* Section label above the dropdown */
    label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #c8c8e8;
    }

    /* Format dropdown */
    select {
        background: #43434e;
        border: none;
        border-radius: 6px;
        color: #f0f0ee;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        padding: 7px 9px;
        width: 100%;
        outline: none;
        cursor: pointer;
    }
    select:focus { border-color: #e07a27; }

    /* Confirmation shown briefly after saving */
    .saved { font-size: 0.65rem; color: #4ade80; height: 12px; }
</style>
</head>
<body>

<label>Output format</label>
<select id="format">
    <option value="png">PNG</option>
    <option value="jpeg">JPEG</option>
    <option value="webp">WebP</option>
</select>

<!-- Upscaling method used by the upscaled download option -->
<label>Upscale method</label>
<select id="upscaleMethod">
    <option value="bicubic">Bicubic</option>
    <option value="lanczos">Lanczos</option>
    <option value="ai">AI (Real-ESRGAN)</option>
</select>

<!-- Scale factor used by the upscaled download option -->
<label>Upscale scale</label>
<select id="scale">
    <option value="2">2×</option>
    <option value="3">3×</option>
    <option value="4">4×</option>
</select>

<!-- Confirmation message, toggled by popup.js -->
<div class="saved" id="saved"></div>

<script src="popup.js"></script>
</body>
</html>
