<!--
  popup.html
  Extension popup for ImageConvert. Lets the user pick the output format
  (PNG, JPEG, WebP) which is persisted via chrome.storage.sync.
  Logic is handled in popup.js.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: ui-monospace, monospace;
    background: #6767a0;
    color: #f0f0ee;
    padding: 12px;
    width: 200px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Section label above the dropdown */
  label { font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: #6b6b70;
  }

  /* Format dropdown */
  select {
    background: #43434e;
    border: none;
    border-radius: 6px;
    color: #f0f0ee;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    padding: 7px 9px;
    width: 100%;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #e07a27; }

  /* Confirmation shown briefly after saving */
  .saved { font-size: 0.65rem; color: #4ade80; height: 12px; }
</style>
</head>
<body>

<label>Output format</label>
<select id="format">
  <option value="png">PNG</option>
  <option value="jpeg">JPEG</option>
  <option value="webp">WebP</option>
</select>

<!-- Confirmation message, toggled by popup.js -->
<div class="saved" id="saved"></div>

<script src="popup.js"></script>
</body>
</html>
